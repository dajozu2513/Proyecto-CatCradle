<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CAT'S CRADLE — BY JOEL SOTO</title>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029074/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300;1,600&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">

  <style>
    /* ── Design system (mirrored from Black & White) ──────── */
    :root {
      --ink:      #0e0e0d;
      --surface:  rgba(14, 14, 13, 0.97);
      --white:    #ffffff;
      --dim:      rgba(255,255,255,0.45);
      --faint:    rgba(255,255,255,0.12);
      --border:   rgba(255,255,255,0.13);
      --radius:   2px;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body:    'Montserrat', sans-serif;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      width:100%; height:100%;
      overflow:hidden;
      background: var(--ink);
      font-family: var(--font-body);
      font-weight: 300;
    }

    /* Subtle scanlines */
    body::after {
      content:'';
      position:fixed; inset:0;
      background: repeating-linear-gradient(
        0deg, transparent 0px, transparent 2px,
        rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 3px
      );
      pointer-events:none; z-index:200;
    }

    canvas {
      position:fixed !important;
      top:0 !important; left:0 !important;
      z-index:1;
    }

    video { display:none; }

    /* ── Corner brackets ─────────────────────────────────── */
    .corner {
      position:fixed; z-index:30; pointer-events:none;
      width:18px; height:18px; opacity:.18;
    }
    .corner.tl { top:10px;  left:10px;  border-top:1px solid var(--white); border-left:1px solid var(--white); }
    .corner.tr { top:10px;  right:10px; border-top:1px solid var(--white); border-right:1px solid var(--white); }
    .corner.bl { bottom:10px; left:10px;  border-bottom:1px solid var(--white); border-left:1px solid var(--white); }
    .corner.br { bottom:10px; right:10px; border-bottom:1px solid var(--white); border-right:1px solid var(--white); }

    /* ── HUD top-left ─────────────────────────────────────── */
    #hud {
      position:fixed; top:14px; left:16px;
      z-index:30; pointer-events:none;
      display:flex; flex-direction:column; gap:6px;
    }
    .hud-row {
      display:flex; align-items:center; gap:9px;
      color: rgba(255,255,255,0.3);
      font-family: var(--font-body);
      font-size:8.5px; letter-spacing:.25em; text-transform:uppercase;
    }
    .hdot {
      width:5px; height:5px; border-radius:50%;
      background: rgba(255,255,255,0.15);
      flex-shrink:0;
      transition: background .4s;
    }
    .hdot.ok  { background: var(--white); }
    .hdot.err { background: rgba(255,255,255,0.35); }
    .hdot.on  { background: var(--white); }

    /* ── Mode label bottom-center ─────────────────────────── */
    #mode-label {
      position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
      z-index:30; pointer-events:none;
      font-family: var(--font-display);
      font-style: italic;
      font-weight: 300;
      font-size:14px; letter-spacing:.35em; text-transform:uppercase;
      color: rgba(255,255,255,0.2);
    }

    /* ── Menu toggle button ───────────────────────────────── */
    #menu-btn {
      position:fixed; top:12px; right:14px;
      z-index:160;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.28);
      color: rgba(255,255,255,0.75);
      font-family: var(--font-body);
      font-weight: 300;
      font-size:9.5px; letter-spacing:.28em; text-transform:uppercase;
      padding:8px 16px;
      cursor:pointer;
      border-radius: var(--radius);
      transition: background .25s, color .25s, border-color .25s;
    }
    #menu-btn:hover {
      background: var(--white);
      color: var(--ink);
      border-color: var(--white);
    }

    /* ── Slide-in panel ───────────────────────────────────── */
    #panel {
      position:fixed; top:0; right:0;
      width:268px; height:100vh;
      background: var(--surface);
      border-left: 1px solid var(--border);
      z-index:150;
      transform: translateX(100%);
      transition: transform .4s cubic-bezier(.4,0,.2,1);
      overflow-y:auto; overflow-x:hidden;
      padding:28px 22px 32px;
    }
    #panel.open { transform:translateX(0); }
    #panel::-webkit-scrollbar { width:2px; }
    #panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); }

    /* Panel header */
    .p-title {
      font-family: var(--font-display);
      font-weight: 600;
      font-size:17px; letter-spacing:.2em; text-transform:uppercase;
      color: var(--white);
      margin-bottom:3px;
    }
    .p-sub {
      font-family: var(--font-body);
      font-weight: 200;
      font-size:8.5px; letter-spacing:.28em; text-transform:uppercase;
      color: rgba(255,255,255,0.3);
      margin-bottom:28px;
    }

    /* Divider */
    .divider {
      height:1px;
      background: var(--border);
      margin:18px 0;
    }

    /* Section label */
    .sec-lbl {
      font-family: var(--font-body);
      font-weight: 200;
      font-size:8px; letter-spacing:.35em; text-transform:uppercase;
      color: rgba(255,255,255,0.3);
      margin-bottom:12px;
    }

    /* Status */
    .p-status {
      display:flex; align-items:center; gap:10px;
      padding:9px 12px;
      border:1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom:10px;
    }
    .sdot {
      width:6px; height:6px; border-radius:50%;
      background: rgba(255,255,255,0.15); flex-shrink:0;
      transition: background .35s;
    }
    .sdot.ok  { background: var(--white); }
    .sdot.err { background: rgba(255,255,255,0.3); }
    #p-stxt {
      font-family: var(--font-body);
      font-weight: 300;
      font-size:9px; letter-spacing:.2em; text-transform:uppercase;
      color: rgba(255,255,255,0.6);
    }

    .p-pips { display:flex; gap:6px; margin-bottom:4px; }
    .p-pip {
      flex:1; height:1px;
      background: rgba(255,255,255,0.1);
      transition: background .3s;
    }
    .p-pip.on { background: var(--white); }
    .p-pip-txt {
      font-family: var(--font-body);
      font-weight: 200;
      font-size:8.5px; letter-spacing:.2em; text-transform:uppercase;
      color: rgba(255,255,255,0.28);
      margin-bottom:16px;
    }

    /* Mode grid */
    .mode-grid {
      display:grid; grid-template-columns:1fr 1fr;
      gap:5px; margin-bottom:4px;
    }
    .mbtn {
      background: transparent;
      border:1px solid var(--border);
      color: rgba(255,255,255,0.4);
      font-family: var(--font-body);
      font-weight: 300;
      font-size:8px; letter-spacing:.18em; text-transform:uppercase;
      padding:10px 4px; cursor:pointer;
      border-radius: var(--radius);
      transition: background .22s, color .22s, border-color .22s;
      line-height:1.5; text-align:center;
    }
    .mbtn:hover {
      border-color: rgba(255,255,255,0.4);
      color: rgba(255,255,255,0.85);
    }
    .mbtn.sel {
      background: var(--white);
      border-color: var(--white);
      color: var(--ink);
      font-weight: 400;
    }

    /* Sliders */
    .ctrl { margin-bottom:15px; }
    .ctrl-row {
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom:6px;
    }
    .ctrl-row span:first-child {
      font-family: var(--font-body);
      font-weight: 300;
      font-size:9px; letter-spacing:.2em; text-transform:uppercase;
      color: rgba(255,255,255,0.5);
    }
    .ctrl-row span:last-child {
      font-family: var(--font-display);
      font-weight: 300;
      font-size:12px;
      color: rgba(255,255,255,0.6);
      min-width:34px; text-align:right;
    }
    input[type=range] {
      width:100%; height:1px;
      background: rgba(255,255,255,0.12);
      border-radius:0;
      outline:none; -webkit-appearance:none; cursor:pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance:none;
      width:10px; height:10px;
      background: var(--white);
      border-radius:50%;
      box-shadow: none;
      transition: transform .15s;
    }
    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.35); }
    input[type=range]::-moz-range-thumb {
      width:10px; height:10px;
      background: var(--white);
      border-radius:50%; border:none;
    }

    /* Action buttons */
    .abtn {
      display:block; width:100%; padding:10px;
      margin-bottom:7px;
      background: transparent;
      border:1px solid var(--border);
      color: rgba(255,255,255,0.5);
      font-family: var(--font-body);
      font-weight: 300;
      font-size:8.5px; letter-spacing:.28em; text-transform:uppercase;
      cursor:pointer;
      border-radius: var(--radius);
      transition: background .22s, color .22s, border-color .22s;
    }
    .abtn:last-child { margin-bottom:0; }
    .abtn:hover {
      background: var(--white);
      border-color: var(--white);
      color: var(--ink);
    }
  </style>
</head>
<body>
  <video id="video" playsinline autoplay muted></video>

  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-row">
      <div class="hdot" id="h-cam"></div>
      <span id="h-cam-txt">Initializing</span>
    </div>
    <div class="hud-row">
      <div class="hdot" id="h-h1"></div>
      <div class="hdot" id="h-h2"></div>
      <span id="h-hands">0 hands</span>
    </div>
  </div>

  <div id="mode-label">Constellation</div>

  <!-- Menu toggle -->
  <button id="menu-btn" onclick="toggleMenu()">≡ Menu</button>

  <!-- Slide-in panel -->
  <div id="panel">
    <div class="p-title">Cat's Cradle</div>
    <div class="p-sub">By Joel Soto</div>

    <div class="sec-lbl">Status</div>
    <div class="p-status">
      <div class="sdot" id="p-sdot"></div>
      <span id="p-stxt">Initializing</span>
    </div>
    <div class="p-pips">
      <div class="p-pip" id="p-p1"></div>
      <div class="p-pip" id="p-p2"></div>
    </div>
    <div class="p-pip-txt" id="p-htxt">0 hands detected</div>

    <div class="divider"></div>

    <div class="sec-lbl">Figure Mode</div>
    <div class="mode-grid" id="mode-grid"></div>

    <div class="divider"></div>

    <div class="sec-lbl">Visual</div>

    <div class="ctrl">
      <div class="ctrl-row"><span>Glow</span><span id="v-glow">20</span></div>
      <input type="range" id="s-glow" min="0" max="50" step="1" value="20"
             oninput="sp('glow',+this.value,'v-glow')">
    </div>
    <div class="ctrl">
      <div class="ctrl-row"><span>Trail</span><span id="v-trail">200</span></div>
      <input type="range" id="s-trail" min="60" max="255" step="5" value="200"
             oninput="sp('trail',+this.value,'v-trail')">
    </div>
    <div class="ctrl">
      <div class="ctrl-row"><span>Video Mix</span><span id="v-vmix">0.5</span></div>
      <input type="range" id="s-vmix" min="0.0" max="1.0" step="0.05" value="0.50"
             oninput="sp('vmix',+this.value,'v-vmix')">
    </div>
    <div class="ctrl">
      <div class="ctrl-row"><span>Line Weight</span><span id="v-lw">1.8</span></div>
      <input type="range" id="s-lw" min="0.3" max="5" step="0.1" value="1.8"
             oninput="sp('lw',+this.value,'v-lw')">
    </div>
    <div class="ctrl">
      <div class="ctrl-row"><span>Sag / Wobble</span><span id="v-sag">0.16</span></div>
      <input type="range" id="s-sag" min="0" max="0.5" step="0.01" value="0.16"
             oninput="sp('sag',+this.value,'v-sag')">
    </div>
    <div class="ctrl">
      <div class="ctrl-row"><span>Dot Size</span><span id="v-dot">7</span></div>
      <input type="range" id="s-dot" min="2" max="18" step="1" value="7"
             oninput="sp('dot',+this.value,'v-dot')">
    </div>
    <div class="ctrl">
      <div class="ctrl-row"><span>Anim Speed</span><span id="v-spd">1.0</span></div>
      <input type="range" id="s-spd" min="0.1" max="3.0" step="0.1" value="1.0"
             oninput="sp('spd',+this.value,'v-spd')">
    </div>

    <div class="divider"></div>

    <div class="sec-lbl">Actions</div>
    <button class="abtn" onclick="screenshot()">Screenshot</button>
    <button class="abtn" onclick="resetP()">Reset Params</button>
  </div>

  <script>
  // ═══════════════════════════════════════════════════════
  //  CONSTANTS
  // ═══════════════════════════════════════════════════════
  const TIPS  = [4, 8, 12, 16, 20];
  const BONES = [
    [0,1],[1,2],[2,3],[3,4],
    [0,5],[5,6],[6,7],[7,8],
    [0,9],[9,10],[10,11],[11,12],
    [0,13],[13,14],[14,15],[15,16],
    [0,17],[17,18],[18,19],[19,20],
    [5,9],[9,13],[13,17],[0,17],
  ];

  // Black & White palette — everything in luminance only
  const CW  = [255, 255, 255];   // bright white
  const CD  = [180, 180, 180];   // dim white
  const CF  = [100, 100, 100];   // faint white

  // ── Modes ───────────────────────────────────────────────
  const MODES = [
    { label:'Neural\nWeb',       fn: modeNeuralWeb    },
    { label:'Double\nHelix',     fn: modeHelix        },
    { label:'Sigil\nGate',       fn: modeSigilGate    },
    { label:'Circuit\nTrace',    fn: modeCircuit      },
    { label:'Vortex\nPortal',    fn: modeVortex       },
    { label:'Constel-\nlation',  fn: modeConstellation},
  ];
  let mode = 5;

  // ── Params ──────────────────────────────────────────────
  const DEF = { glow:20, trail:200, vmix:0.50, lw:1.8, sag:0.16, dot:7, spd:1.0 };
  let P = {...DEF};

  // ── State ───────────────────────────────────────────────
  let handResults = null;
  let hands = [];
  const vid = document.getElementById('video');
  let T = 0;
  let menuOpen = false;

  // ═══════════════════════════════════════════════════════
  //  P5 SKETCH
  // ═══════════════════════════════════════════════════════
  function setup() {
    let c = createCanvas(windowWidth, windowHeight);
    c.elt.style.zIndex = '1';
    colorMode(RGB, 255, 255, 255, 255);
    frameRate(60);
    buildModeGrid();
  }

  function draw() {
    T += 0.016 * P.spd;

    // Dark trail overlay — warm near-black matching --ink
    noStroke(); fill(14, 14, 13, P.trail);
    rect(0, 0, width, height);

    // Mirrored webcam
    if (vid.readyState >= 2) {
      push();
      translate(width, 0); scale(-1, 1);
      drawingContext.globalAlpha = P.vmix;
      drawingContext.drawImage(vid, 0, 0, width, height);
      drawingContext.globalAlpha = 1;
      pop();
    }

    // Subtle background grid
    drawGrid();

    hands = handResults?.multiHandLandmarks ?? [];
    syncHandUI(hands.length);

    if      (hands.length >= 2) MODES[mode].fn(hands[0], hands[1]);
    else if (hands.length === 1) MODES[mode].fn(hands[0], null);
    for (const h of hands) { drawBones(h); drawDots(h); }
  }

  function windowResized() { resizeCanvas(windowWidth, windowHeight); }

  // ─── Coordinate helpers ──────────────────────────────────
  const lx = lm => (1 - lm.x) * width;
  const ly = lm => lm.y * height;
  function center(h) {
    let sx=0, sy=0;
    for (const lm of h) { sx+=lx(lm); sy+=ly(lm); }
    return { x: sx/h.length, y: sy/h.length };
  }

  // ─── Background grid ─────────────────────────────────────
  function drawGrid() {
    const step = 55;
    stroke(255, 255, 255, 5); strokeWeight(0.4);
    for (let x=0; x<width;  x+=step) line(x,0,x,height);
    for (let y=0; y<height; y+=step) line(0,y,width,y);
  }

  // ─── Glow helpers ─────────────────────────────────────────
  function glow(col, blur) {
    drawingContext.shadowBlur  = blur;
    drawingContext.shadowColor = `rgb(${col[0]},${col[1]},${col[2]})`;
  }
  function noGlow() { drawingContext.shadowBlur = 0; }

  // ─── Bezier stroke helper ─────────────────────────────────
  function bezier2(ax,ay,cpx,cpy,bx,by) {
    beginShape(); vertex(ax,ay); quadraticVertex(cpx,cpy,bx,by); endShape();
  }

  // ─── Bones ────────────────────────────────────────────────
  function drawBones(h) {
    glow(CF, P.glow * 0.25);
    stroke(255, 255, 255, 22); strokeWeight(0.6); noFill();
    for (const [a,b] of BONES) line(lx(h[a]),ly(h[a]),lx(h[b]),ly(h[b]));
    noGlow();
  }

  // ─── Dots ─────────────────────────────────────────────────
  function drawDots(h) {
    noStroke();
    const pulse = 1 + 0.18 * Math.sin(T * 5.5);
    for (let i=0; i<h.length; i++) {
      const x=lx(h[i]), y=ly(h[i]);
      const tip = TIPS.includes(i);
      const r   = tip ? P.dot * pulse : P.dot * 0.4;

      glow(CW, P.glow * (tip ? 1.3 : 0.45));
      fill(255, 255, 255, tip ? 210 : 120);
      circle(x, y, r * 2);

      if (tip) {
        // Bright white core
        glow(CW, P.glow * 0.4); fill(255, 255, 255, 240);
        circle(x, y, r * 0.52);
      }
      noGlow();
    }
  }

  // ═══════════════════════════════════════════════════════
  //  MODE 0 — NEURAL WEB
  // ═══════════════════════════════════════════════════════
  function modeNeuralWeb(h0, h1) {
    const pairs = [];
    if (h1) {
      for (let ai=0; ai<TIPS.length; ai++)
        for (let bi=0; bi<TIPS.length; bi++)
          pairs.push([h0[TIPS[ai]], h1[TIPS[bi]], ai, bi]);
    } else {
      for (let ai=0; ai<TIPS.length; ai++)
        for (let bi=ai+1; bi<TIPS.length; bi++)
          pairs.push([h0[TIPS[ai]], h0[TIPS[bi]], ai, bi]);
    }

    for (const [A, B, ai, bi] of pairs) {
      const ax=lx(A), ay=ly(A), bx=lx(B), by=ly(B);
      const d   = Math.hypot(bx-ax, by-ay);
      const ten = Math.min(d / (Math.hypot(width,height) * 0.52), 1);

      const mx=(ax+bx)*0.5, my=(ay+by)*0.5;
      const len=d||1;
      const nx=-(by-ay)/len, ny=(bx-ax)/len;
      const sag = d * P.sag * Math.sin(T*3 + ai*1.37 + bi*0.91);
      const cpx=mx+nx*sag, cpy=my+ny*sag;

      const sw = map(ten, 0, 1, P.lw, P.lw * 0.18);
      const al = map(ten, 0, 1, 190, 50);

      // Outer bloom
      glow(CW, P.glow * 0.85);
      stroke(255, 255, 255, al * 0.22); strokeWeight(sw + 5); noFill();
      bezier2(ax,ay,cpx,cpy,bx,by);
      // Core
      glow(CW, P.glow * 0.3);
      stroke(255, 255, 255, al); strokeWeight(sw);
      bezier2(ax,ay,cpx,cpy,bx,by);
      noGlow();
    }
  }

  // ═══════════════════════════════════════════════════════
  //  MODE 1 — DOUBLE HELIX
  // ═══════════════════════════════════════════════════════
  function modeHelix(h0, h1) {
    const c0 = h1 ? center(h0) : { x:lx(h0[0]),  y:ly(h0[0])  };
    const c1 = h1 ? center(h1) : { x:lx(h0[12]), y:ly(h0[12]) };

    const dx=c1.x-c0.x, dy=c1.y-c0.y;
    const axLen = Math.hypot(dx,dy)||1;
    const px=-dy/axLen, py=dx/axLen;

    const STEPS=120, TWISTS=6;
    const amp = axLen * 0.09;
    const s0=[], s1=[];

    for (let i=0; i<=STEPS; i++) {
      const tt = i/STEPS;
      const bx = c0.x + dx*tt, by = c0.y + dy*tt;
      const ang = TWISTS * TWO_PI * tt + T * 2.2;
      const off = Math.cos(ang) * amp;
      s0.push({ x: bx + px*off, y: by + py*off });
      s1.push({ x: bx - px*off, y: by - py*off });
    }

    const drawStrand = (pts, al) => {
      glow(CW, P.glow);
      stroke(255, 255, 255, al); strokeWeight(P.lw); noFill();
      beginShape();
      for (const p of pts) vertex(p.x,p.y);
      endShape();
      noGlow();
    };
    drawStrand(s0, 200);
    drawStrand(s1, 120);

    const interval = Math.max(2, Math.floor(STEPS / (TWISTS * 2)));
    for (let i=interval; i<STEPS; i+=interval) {
      const p0=s0[i], p1=s1[i];
      glow(CW, P.glow * 0.5);
      stroke(255,255,255,90); strokeWeight(P.lw * 0.55);
      line(p0.x,p0.y,p1.x,p1.y);
      noStroke(); fill(255,255,255,170);
      circle(p0.x,p0.y,4); circle(p1.x,p1.y,4);
      noGlow();
    }
  }

  // ═══════════════════════════════════════════════════════
  //  MODE 2 — SIGIL GATE
  // ═══════════════════════════════════════════════════════
  function modeSigilGate(h0, h1) {
    const c0=center(h0), c1=h1 ? center(h1) : { x:lx(h0[9]), y:ly(h0[9]) };
    const cx=(c0.x+c1.x)*0.5, cy=(c0.y+c1.y)*0.5;
    const dist = h1 ? Math.hypot(c1.x-c0.x, c1.y-c0.y)
                    : Math.hypot(lx(h0[12])-lx(h0[0]), ly(h0[12])-ly(h0[0])) * 1.4;
    const R = dist * 0.38;
    const r0=T*0.45, r1=-T*0.65;

    const poly = (n, r, rot, al, sw_=P.lw*0.65) => {
      glow(CW, P.glow * 0.8);
      stroke(255,255,255,al); strokeWeight(sw_); noFill();
      beginShape();
      for (let i=0; i<=n; i++) {
        const a = rot + TWO_PI*i/n - HALF_PI;
        vertex(cx+cos(a)*r, cy+sin(a)*r);
      }
      endShape();
      noGlow();
    };

    const star = (n, r1_, r2, rot, al) => {
      glow(CW, P.glow);
      stroke(255,255,255,al); strokeWeight(P.lw*0.55); noFill();
      beginShape();
      for (let i=0; i<=n*2; i++) {
        const a = rot + TWO_PI*i/(n*2) - HALF_PI;
        const r = (i%2===0) ? r1_ : r2;
        vertex(cx+cos(a)*r, cy+sin(a)*r);
      }
      endShape();
      noGlow();
    };

    // Outer ring
    glow(CW, P.glow*0.4); stroke(255,255,255,50); strokeWeight(P.lw*0.4); noFill();
    circle(cx,cy,R*2.15); noGlow();

    star(5, R*0.95, R*0.4,  r0,     145);
    poly(6, R*0.68,          r1,     100);
    poly(3, R*0.55,          r0*1.6,  85);
    star(4, R*0.32, R*0.15, r1*2.1,  165);

    // Spokes
    glow(CW, P.glow*0.25); stroke(255,255,255,35); strokeWeight(P.lw*0.3);
    for (let i=0; i<10; i++) {
      const a = r0 + TWO_PI*i/10 - HALF_PI;
      line(cx,cy, cx+cos(a)*R*0.92, cy+sin(a)*R*0.92);
    }
    noGlow();

    // Center orb
    glow(CW, P.glow*1.8); noStroke(); fill(255,255,255,230); circle(cx,cy,7); noGlow();

    // Fingertip anchors
    glow(CW, P.glow*0.3); stroke(255,255,255,28); strokeWeight(P.lw*0.3);
    for (const h of [h0, h1].filter(Boolean)) {
      for (const ti of TIPS) line(cx,cy, lx(h[ti]), ly(h[ti]));
    }
    noGlow();
  }

  // ═══════════════════════════════════════════════════════
  //  MODE 3 — CIRCUIT TRACE
  // ═══════════════════════════════════════════════════════
  function modeCircuit(h0, h1) {
    if (h1) {
      for (let i=0; i<TIPS.length; i++) {
        const A=h0[TIPS[i]], B=h1[TIPS[i]];
        const ax=lx(A), ay=ly(A), bx=lx(B), by=ly(B);
        const kx=(ax+bx)*0.5;

        glow(CW, P.glow*0.6);
        stroke(255,255,255,110); strokeWeight(P.lw); noFill();
        line(ax,ay, kx,ay); line(kx,ay, kx,by); line(kx,by, bx,by);
        noGlow();

        const ps=P.dot*0.7;
        glow(CW, P.glow*0.9); fill(255,255,255,170); noStroke();
        rect(ax-ps/2,ay-ps/2,ps,ps); rect(bx-ps/2,by-ps/2,ps,ps);
        fill(255,255,255,130);
        circle(kx,ay,ps*0.65); circle(kx,by,ps*0.65);
        noGlow();

        const seg1=Math.abs(kx-ax), seg2=Math.abs(by-ay), seg3=Math.abs(bx-kx);
        const total=(seg1+seg2+seg3)||1;
        const pOff=((T*90+i*35)%total);
        let ppx=ax, ppy=ay;
        if (pOff<seg1)           { ppx=ax+(kx-ax)*(pOff/seg1); ppy=ay; }
        else if (pOff<seg1+seg2) { ppx=kx; ppy=ay+(by-ay)*((pOff-seg1)/(seg2||1)); }
        else                     { ppx=kx+(bx-kx)*((pOff-seg1-seg2)/(seg3||1)); ppy=by; }
        glow(CW, P.glow*2); noStroke(); fill(255,255,255,245); circle(ppx,ppy,4); noGlow();
      }
      const w0=h0[0], w1=h1[0];
      glow(CW,P.glow*0.25); stroke(255,255,255,20); strokeWeight(P.lw*0.3);
      line(lx(w0),ly(w0),lx(w1),ly(w1)); noGlow();
    } else {
      const wx=lx(h0[0]), wy=ly(h0[0]);
      for (let i=0; i<TIPS.length; i++) {
        const ax=lx(h0[TIPS[i]]), ay=ly(h0[TIPS[i]]);
        const kx=wx, ky=ay;

        glow(CW, P.glow*0.6);
        stroke(255,255,255,110); strokeWeight(P.lw); noFill();
        line(wx,wy, kx,ky); line(kx,ky, ax,ay);
        noGlow();

        const ps=P.dot*0.7;
        glow(CW,P.glow*0.9); fill(255,255,255,165); noStroke();
        rect(ax-ps/2,ay-ps/2,ps,ps);
        fill(255,255,255,125); circle(kx,ky,ps*0.65); noGlow();

        const seg1=Math.abs(ky-wy), seg2=Math.abs(ax-kx);
        const total=(seg1+seg2)||1;
        const pOff=((T*90+i*35)%total);
        let ppx=wx, ppy=wy;
        if (pOff<seg1) { ppx=wx; ppy=wy+(ky-wy)*(pOff/seg1); }
        else           { ppx=kx+(ax-kx)*((pOff-seg1)/(seg2||1)); ppy=ky; }
        glow(CW,P.glow*2); noStroke(); fill(255,255,255,245); circle(ppx,ppy,4); noGlow();
      }
      const ps=P.dot*0.9;
      glow(CW,P.glow); fill(255,255,255,175); noStroke();
      rect(wx-ps/2,wy-ps/2,ps,ps); noGlow();
    }
  }

  // ═══════════════════════════════════════════════════════
  //  MODE 4 — VORTEX PORTAL
  // ═══════════════════════════════════════════════════════
  function modeVortex(h0, h1) {
    const c0 = center(h0);
    const c1 = h1 ? center(h1) : { x:lx(h0[12]), y:ly(h0[12]) };
    const cx=(c0.x+c1.x)*0.5, cy=(c0.y+c1.y)*0.5;
    const dist = Math.hypot(c1.x-c0.x, c1.y-c0.y);
    const axAngle = Math.atan2(c1.y-c0.y, c1.x-c0.x) + HALF_PI;
    const maxR = dist * 0.58;
    const RINGS = 16;

    push(); translate(cx,cy); rotate(axAngle);
    for (let i=RINGS; i>=1; i--) {
      const tr    = i/RINGS;
      const ringR = maxR * tr;
      const squish = 0.28 + tr*0.14;
      const rotOff = T * 0.9 * (i%2===0 ? 1 : -1);
      const al    = map(i,1,RINGS, 230, 30);
      const sw    = map(i,1,RINGS, P.lw*1.3, P.lw*0.22);

      glow(CW, P.glow * 0.6 * tr);
      stroke(255,255,255,al); strokeWeight(sw); noFill();
      push(); rotate(rotOff);
      ellipse(0,0, ringR*2, ringR*2*squish);
      pop();
      noGlow();
    }
    glow(CW, P.glow*2); noStroke(); fill(255,255,255,230); circle(0,0,P.dot*1.8); noGlow();
    pop();

    for (const c of (h1 ? [c0,c1] : [c0])) {
      glow(CW,P.glow*0.35); stroke(255,255,255,45); strokeWeight(P.lw*0.35);
      line(c.x,c.y,cx,cy); noGlow();
    }
  }

  // ═══════════════════════════════════════════════════════
  //  MODE 5 — CONSTELLATION
  // ═══════════════════════════════════════════════════════
  function modeConstellation(h0, h1) {
    const nodes = h1
      ? [ ...TIPS.map(i => ({ x:lx(h0[i]), y:ly(h0[i]) })),
          ...TIPS.map(i => ({ x:lx(h1[i]), y:ly(h1[i]) })) ]
      : TIPS.map(i => ({ x:lx(h0[i]), y:ly(h0[i]) }));

    const closeD = Math.hypot(width,height) * 0.12;

    for (let a=0; a<nodes.length; a++) {
      for (let b=a+1; b<nodes.length; b++) {
        const d    = Math.hypot(nodes[b].x-nodes[a].x, nodes[b].y-nodes[a].y);
        const al   = max(65, map(d, 0, closeD, 175, 65));
        const sw   = max(P.lw*0.22, map(d, 0, closeD, P.lw*0.9, P.lw*0.3));
        const pulse = (sin(T*2.2 + a*0.6 + b*0.4) + 1) * 0.5;

        glow(CW, P.glow * 0.4 * pulse);
        stroke(255,255,255, al*(0.55 + 0.45*pulse));
        strokeWeight(sw);
        line(nodes[a].x,nodes[a].y, nodes[b].x,nodes[b].y);
        noGlow();
      }
    }

    // Node markers
    for (const n of nodes) {
      const s = P.dot * 0.9;
      glow(CW, P.glow*0.85);
      stroke(255,255,255,185); strokeWeight(0.7); noFill();
      line(n.x-s,n.y,   n.x+s,n.y);
      line(n.x,  n.y-s, n.x,  n.y+s);
      line(n.x-s*.55,n.y,   n.x,n.y-s*.55);
      line(n.x,n.y-s*.55,   n.x+s*.55,n.y);
      line(n.x+s*.55,n.y,   n.x,n.y+s*.55);
      line(n.x,n.y+s*.55,   n.x-s*.55,n.y);
      noGlow();
      glow(CW,P.glow*0.45); noStroke(); fill(255,255,255,195); circle(n.x,n.y,2.5); noGlow();
    }

    // Ghostly wrist anchors
    const wrists = h1 ? [h0[0],h1[0]] : [h0[0]];
    glow(CW,P.glow*0.2); stroke(255,255,255,15); strokeWeight(P.lw*0.22);
    for (const n of nodes)
      for (const w of wrists) line(n.x,n.y,lx(w),ly(w));
    noGlow();
  }

  // ═══════════════════════════════════════════════════════
  //  MEDIAPIPE
  // ═══════════════════════════════════════════════════════
  function initMP() {
    const tracker = new Hands({
      locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`,
    });
    tracker.setOptions({ maxNumHands:2, modelComplexity:1,
      minDetectionConfidence:0.65, minTrackingConfidence:0.55 });
    tracker.onResults(r => { handResults = r; });

    new Camera(vid, {
      onFrame: async () => { await tracker.send({ image: vid }); },
      width:1280, height:720,
    }).start()
      .then(()  => setCamOK(true))
      .catch(e  => { setCamOK(false); console.error(e); });
  }

  // ═══════════════════════════════════════════════════════
  //  UI
  // ═══════════════════════════════════════════════════════
  function setCamOK(ok) {
    const cls = ok ? 'ok' : 'err';
    const txt = ok ? 'Camera active' : 'Camera error';
    document.getElementById('h-cam').className   = 'hdot ' + cls;
    document.getElementById('p-sdot').className  = 'sdot ' + cls;
    document.getElementById('h-cam-txt').textContent = txt;
    document.getElementById('p-stxt').textContent    = txt;
  }

  function syncHandUI(n) {
    document.getElementById('h-h1').className = 'hdot' + (n>=1?' on':'');
    document.getElementById('h-h2').className = 'hdot' + (n>=2?' on':'');
    document.getElementById('p-p1').className = 'p-pip' + (n>=1?' on':'');
    document.getElementById('p-p2').className = 'p-pip' + (n>=2?' on':'');
    const t = n + ' hand' + (n!==1?'s':'') + ' detected';
    document.getElementById('h-hands').textContent = t;
    document.getElementById('p-htxt').textContent  = t;
  }

  function toggleMenu() {
    menuOpen = !menuOpen;
    document.getElementById('panel').classList.toggle('open', menuOpen);
    document.getElementById('menu-btn').textContent = menuOpen ? '✕ Close' : '≡ Menu';
  }

  function buildModeGrid() {
    const grid = document.getElementById('mode-grid');
    MODES.forEach((m,i) => {
      const b = document.createElement('button');
      b.className = 'mbtn' + (i===mode?' sel':'');
      b.innerHTML = m.label.replace('\n','<br>');
      b.onclick = () => selectMode(i);
      grid.appendChild(b);
    });
  }

  function selectMode(i) {
    mode = i;
    document.querySelectorAll('.mbtn').forEach((b,j) => b.classList.toggle('sel', j===i));
    document.getElementById('mode-label').textContent = MODES[i].label.replace('\n',' ');
  }

  function sp(key, val, dispId) {
    P[key] = val;
    document.getElementById(dispId).textContent = val;
  }

  function screenshot() {
    try {
      const c = document.querySelector('canvas');
      const a = document.createElement('a');
      a.download = 'catscradle-' + Date.now() + '.png';
      a.href = c.toDataURL('image/png');
      a.click();
    } catch(e) { console.warn('Screenshot blocked:', e); }
  }

  function resetP() {
    P = {...DEF};
    [['s-glow','v-glow','glow'],['s-trail','v-trail','trail'],
     ['s-vmix','v-vmix','vmix'],['s-lw','v-lw','lw'],
     ['s-sag','v-sag','sag'],['s-dot','v-dot','dot'],
     ['s-spd','v-spd','spd']].forEach(([sid,vid,key]) => {
       document.getElementById(sid).value = P[key];
       document.getElementById(vid).textContent = P[key];
    });
  }

  window.addEventListener('load', initMP);
  </script>
</body>
</html>

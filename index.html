<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CAT'S CRADLE // CYBERSIGILISM</title>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029074/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <style>
    :root {
      --c:   #00e5ff;       /* primary cyan neon */
      --cd:  rgba(0,229,255,0.18);
      --cg:  rgba(0,229,255,0.07);
      --bg:  #030308;
      --pbg: rgba(3,3,14,0.97);
      --w:   #d8f0ff;       /* near-white */
      --g:   #00ff88;       /* green – active/ok */
      --r:   #ff0044;       /* red – error */
      --txt: rgba(0,229,255,0.55);
      --txb: rgba(0,229,255,0.85);
      --mono: 'Share Tech Mono', monospace;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      width:100%; height:100%;
      overflow:hidden;
      background: var(--bg);
      font-family: var(--mono);
    }

    /* Fullscreen scanline overlay */
    body::after {
      content:'';
      position:fixed; inset:0;
      background: repeating-linear-gradient(
        0deg,
        transparent 0px, transparent 2px,
        rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 3px
      );
      pointer-events:none;
      z-index:200;
    }

    canvas {
      position:fixed !important;
      top:0 !important; left:0 !important;
      z-index:1;
    }

    video { display:none; }

    /* ── HUD top-left ───────────────────────────────────── */
    #hud {
      position:fixed; top:14px; left:16px;
      z-index:30; pointer-events:none;
      display:flex; flex-direction:column; gap:5px;
    }
    .hud-row {
      display:flex; align-items:center; gap:8px;
      color: var(--txt);
      font-size:10px; letter-spacing:2px;
    }
    .hdot {
      width:6px; height:6px; border-radius:50%;
      background: rgba(255,255,255,0.12);
      flex-shrink:0;
      transition: background .35s, box-shadow .35s;
    }
    .hdot.ok  { background:var(--g); box-shadow:0 0 7px var(--g); }
    .hdot.err { background:var(--r); box-shadow:0 0 7px var(--r); }
    .hdot.on  { background:var(--c); box-shadow:0 0 7px var(--c); }

    /* ── Mode label bottom-center ───────────────────────── */
    #mode-label {
      position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
      z-index:30; pointer-events:none;
      color: rgba(0,229,255,0.28);
      font-size:9.5px; letter-spacing:5px; text-transform:uppercase;
      text-shadow: 0 0 12px rgba(0,229,255,0.25);
    }

    /* ── Corner brackets ────────────────────────────────── */
    .corner {
      position:fixed; z-index:30; pointer-events:none;
      width:20px; height:20px; opacity:.28;
    }
    .corner.tl { top:8px;  left:8px;  border-top:1px solid var(--c); border-left:1px solid var(--c); }
    .corner.tr { top:8px;  right:8px; border-top:1px solid var(--c); border-right:1px solid var(--c); }
    .corner.bl { bottom:8px; left:8px;  border-bottom:1px solid var(--c); border-left:1px solid var(--c); }
    .corner.br { bottom:8px; right:8px; border-bottom:1px solid var(--c); border-right:1px solid var(--c); }

    /* ── Menu toggle button ─────────────────────────────── */
    #menu-btn {
      position:fixed; top:12px; right:14px;
      z-index:160;
      background: rgba(3,3,14,0.82);
      border: 1px solid var(--cd);
      color: var(--c);
      font-family: var(--mono);
      font-size:11px; letter-spacing:3px;
      padding:7px 14px;
      cursor:pointer;
      backdrop-filter: blur(10px);
      transition: all .2s;
      clip-path: polygon(0 0, calc(100% - 7px) 0, 100% 7px, 100% 100%, 7px 100%, 0 calc(100% - 7px));
    }
    #menu-btn:hover {
      background: var(--cg);
      border-color: var(--c);
      color:#fff;
      box-shadow: 0 0 14px var(--cd), inset 0 0 8px rgba(0,229,255,0.06);
      text-shadow: 0 0 8px var(--c);
    }

    /* ── Slide-in panel ─────────────────────────────────── */
    #panel {
      position:fixed; top:0; right:0;
      width:272px; height:100vh;
      background: var(--pbg);
      border-left: 1px solid rgba(0,229,255,0.14);
      z-index:150;
      transform: translateX(100%);
      transition: transform .38s cubic-bezier(.4,0,.2,1);
      overflow-y:auto; overflow-x:hidden;
      padding:22px 18px 28px;
    }
    #panel.open { transform:translateX(0); }
    #panel::-webkit-scrollbar { width:2px; }
    #panel::-webkit-scrollbar-thumb { background:var(--cd); }

    .p-title {
      color:var(--c); font-size:14px; letter-spacing:4px;
      text-transform:uppercase;
      text-shadow:0 0 12px var(--c);
      margin-bottom:3px;
    }
    .p-sub {
      color:rgba(0,229,255,0.28); font-size:9px; letter-spacing:2px;
      margin-bottom:22px;
    }

    .sec-lbl {
      color:rgba(0,229,255,0.35); font-size:9px; letter-spacing:3px;
      text-transform:uppercase; margin-bottom:10px;
    }
    .divider {
      height:1px;
      background:linear-gradient(90deg,rgba(0,229,255,0.18) 0%,transparent 100%);
      margin:16px 0;
    }

    /* status */
    .p-status {
      display:flex; align-items:center; gap:9px;
      padding:8px 12px;
      background:rgba(0,229,255,0.04);
      border:1px solid rgba(0,229,255,0.1);
      font-size:10px; letter-spacing:1.5px;
      margin-bottom:10px;
    }
    .sdot {
      width:7px; height:7px; border-radius:50%;
      background:rgba(255,255,255,.1); flex-shrink:0;
      transition:all .35s;
    }
    .sdot.ok  { background:var(--g); box-shadow:0 0 8px var(--g); }
    .sdot.err { background:var(--r); box-shadow:0 0 8px var(--r); }

    .p-pips { display:flex; gap:6px; margin-bottom:4px; }
    .p-pip {
      flex:1; height:2px;
      background:rgba(255,255,255,0.07);
      transition:background .3s, box-shadow .3s;
    }
    .p-pip.on { background:var(--c); box-shadow:0 0 5px var(--c); }
    .p-pip-txt { color:rgba(0,229,255,0.3); font-size:9px; letter-spacing:1.5px; margin-bottom:14px; }

    /* mode grid */
    .mode-grid {
      display:grid; grid-template-columns:1fr 1fr;
      gap:5px; margin-bottom:4px;
    }
    .mbtn {
      background:rgba(0,229,255,0.03);
      border:1px solid rgba(0,229,255,0.12);
      color:rgba(0,229,255,0.45);
      font-family:var(--mono); font-size:8.5px;
      letter-spacing:1.5px; text-transform:uppercase;
      padding:9px 4px; cursor:pointer;
      transition:all .18s; line-height:1.4; text-align:center;
    }
    .mbtn:hover {
      background:rgba(0,229,255,0.08);
      border-color:rgba(0,229,255,0.4);
      color:var(--c);
    }
    .mbtn.sel {
      background:rgba(0,229,255,0.1);
      border-color:var(--c);
      color:#fff;
      box-shadow:0 0 10px rgba(0,229,255,0.2), inset 0 0 6px rgba(0,229,255,0.06);
      text-shadow:0 0 7px var(--c);
    }

    /* sliders */
    .ctrl { margin-bottom:13px; }
    .ctrl-row {
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom:5px;
    }
    .ctrl-row span:first-child {
      color:rgba(0,229,255,0.55); font-size:9.5px; letter-spacing:1.5px;
    }
    .ctrl-row span:last-child {
      color:var(--c); font-size:9.5px; min-width:38px; text-align:right;
    }
    input[type=range] {
      width:100%; height:2px;
      background:rgba(0,229,255,0.1); border-radius:1px;
      outline:none; -webkit-appearance:none; cursor:pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance:none;
      width:11px; height:11px;
      background:var(--c); border-radius:50%;
      box-shadow:0 0 7px var(--c);
      transition:transform .15s;
    }
    input[type=range]::-webkit-slider-thumb:hover { transform:scale(1.3); }
    input[type=range]::-moz-range-thumb {
      width:11px; height:11px;
      background:var(--c); border-radius:50%; border:none;
      box-shadow:0 0 7px var(--c);
    }

    /* action buttons */
    .abtn {
      display:block; width:100%; padding:9px;
      margin-bottom:6px;
      background:transparent;
      border:1px solid rgba(0,229,255,0.18);
      color:rgba(0,229,255,0.55);
      font-family:var(--mono); font-size:9.5px;
      letter-spacing:2.5px; text-transform:uppercase;
      cursor:pointer; transition:all .18s;
    }
    .abtn:last-child { margin-bottom:0; }
    .abtn:hover {
      background:rgba(0,229,255,0.07);
      border-color:var(--c); color:#fff;
      box-shadow:0 0 10px rgba(0,229,255,0.15);
      text-shadow:0 0 6px var(--c);
    }
  </style>
</head>
<body>
  <video id="video" playsinline autoplay muted></video>

  <!-- Corner brackets -->
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-row">
      <div class="hdot" id="h-cam"></div>
      <span id="h-cam-txt">INITIALIZING</span>
    </div>
    <div class="hud-row">
      <div class="hdot" id="h-h1"></div>
      <div class="hdot" id="h-h2"></div>
      <span id="h-hands">0 HANDS</span>
    </div>
  </div>

  <div id="mode-label">CONSTELLATION</div>

  <!-- Menu toggle -->
  <button id="menu-btn" onclick="toggleMenu()">≡ SYS</button>

  <!-- Slide-in panel -->
  <div id="panel">
    <div class="p-title">CAT'S CRADLE</div>
    <div class="p-sub">BY JOEL SOTO</div>

    <div class="sec-lbl">// STATUS</div>
    <div class="p-status">
      <div class="sdot" id="p-sdot"></div>
      <span id="p-stxt" style="color:rgba(0,229,255,0.6);font-size:10px;letter-spacing:1.5px;">INITIALIZING</span>
    </div>
    <div class="p-pips">
      <div class="p-pip" id="p-p1"></div>
      <div class="p-pip" id="p-p2"></div>
    </div>
    <div class="p-pip-txt" id="p-htxt">0 HANDS DETECTED</div>

    <div class="divider"></div>

    <div class="sec-lbl">// FIGURE MODE</div>
    <div class="mode-grid" id="mode-grid"></div>

    <div class="divider"></div>

    <div class="sec-lbl">// VISUAL</div>

    <div class="ctrl">
      <div class="ctrl-row"><span>GLOW</span><span id="v-glow">20</span></div>
      <input type="range" id="s-glow" min="0" max="50" step="1" value="20"
             oninput="sp('glow',+this.value,'v-glow')">
    </div>
    <div class="ctrl">
      <div class="ctrl-row"><span>TRAIL</span><span id="v-trail">200</span></div>
      <input type="range" id="s-trail" min="60" max="255" step="5" value="200"
             oninput="sp('trail',+this.value,'v-trail')">
    </div>
    <div class="ctrl">
      <div class="ctrl-row"><span>VIDEO MIX</span><span id="v-vmix">0.50</span></div>
      <input type="range" id="s-vmix" min="0.0" max="1.0" step="0.05" value="0.50"
             oninput="sp('vmix',+this.value,'v-vmix')">
    </div>
    <div class="ctrl">
      <div class="ctrl-row"><span>LINE WEIGHT</span><span id="v-lw">1.8</span></div>
      <input type="range" id="s-lw" min="0.3" max="5" step="0.1" value="1.8"
             oninput="sp('lw',+this.value,'v-lw')">
    </div>
    <div class="ctrl">
      <div class="ctrl-row"><span>SAG / WOBBLE</span><span id="v-sag">0.16</span></div>
      <input type="range" id="s-sag" min="0" max="0.5" step="0.01" value="0.16"
             oninput="sp('sag',+this.value,'v-sag')">
    </div>
    <div class="ctrl">
      <div class="ctrl-row"><span>DOT SIZE</span><span id="v-dot">7</span></div>
      <input type="range" id="s-dot" min="2" max="18" step="1" value="7"
             oninput="sp('dot',+this.value,'v-dot')">
    </div>
    <div class="ctrl">
      <div class="ctrl-row"><span>ANIM SPEED</span><span id="v-spd">1.0</span></div>
      <input type="range" id="s-spd" min="0.1" max="3.0" step="0.1" value="1.0"
             oninput="sp('spd',+this.value,'v-spd')">
    </div>

    <div class="divider"></div>

    <div class="sec-lbl">// ACTIONS</div>
    <button class="abtn" onclick="screenshot()">[ SCREENSHOT ]</button>
    <button class="abtn" onclick="resetP()">[ RESET PARAMS ]</button>
  </div>

  <script>
  // ═══════════════════════════════════════════════════════
  //  CONSTANTS
  // ═══════════════════════════════════════════════════════
  const TIPS  = [4, 8, 12, 16, 20];
  const BONES = [
    [0,1],[1,2],[2,3],[3,4],
    [0,5],[5,6],[6,7],[7,8],
    [0,9],[9,10],[10,11],[11,12],
    [0,13],[13,14],[14,15],[15,16],
    [0,17],[17,18],[18,19],[19,20],
    [5,9],[9,13],[13,17],[0,17],
  ];
  const CN  = [0, 229, 255];   // cyan neon
  const CW  = [216, 240, 255]; // near-white
  const CG  = [0, 255, 136];   // green
  const CA  = [255, 20, 80];   // accent red-pink

  // ── Modes ───────────────────────────────────────────────
  const MODES = [
    { label:'NEURAL\nWEB',       fn: modeNeuralWeb    },
    { label:'DOUBLE\nHELIX',     fn: modeHelix        },
    { label:'SIGIL\nGATE',       fn: modeSigilGate    },
    { label:'CIRCUIT\nTRACE',    fn: modeCircuit      },
    { label:'VORTEX\nPORTAL',    fn: modeVortex       },
    { label:'CONSTEL-\nLATION',  fn: modeConstellation},
  ];
  let mode = 5;

  // ── Params ──────────────────────────────────────────────
  const DEF = { glow:20, trail:200, vmix:0.50, lw:1.8, sag:0.16, dot:7, spd:1.0 };
  let P = {...DEF};

  // ── State ───────────────────────────────────────────────
  let handResults = null;
  let hands = [];
  const vid = document.getElementById('video');
  let T = 0;          // master time
  let menuOpen = false;

  // ═══════════════════════════════════════════════════════
  //  P5 SKETCH
  // ═══════════════════════════════════════════════════════
  function setup() {
    let c = createCanvas(windowWidth, windowHeight);
    c.elt.style.zIndex = '1';
    colorMode(RGB, 255, 255, 255, 255);
    frameRate(60);
    buildModeGrid();
  }

  function draw() {
    T += 0.016 * P.spd;

    // Trail overlay
    noStroke(); fill(3, 3, 12, P.trail);
    rect(0, 0, width, height);

    // Mirrored webcam
    if (vid.readyState >= 2) {
      push();
      translate(width, 0); scale(-1, 1);
      drawingContext.globalAlpha = P.vmix;
      drawingContext.drawImage(vid, 0, 0, width, height);
      drawingContext.globalAlpha = 1;
      pop();
    }

    // Background grid
    drawGrid();

    hands = handResults?.multiHandLandmarks ?? [];
    syncHandUI(hands.length);

    if (hands.length >= 2)      MODES[mode].fn(hands[0], hands[1]);
    else if (hands.length === 1) MODES[mode].fn(hands[0], null);
    for (const h of hands) { drawBones(h); drawDots(h); }
  }

  function windowResized() { resizeCanvas(windowWidth, windowHeight); }

  // ─── Coordinate helpers ─────────────────────────────────
  const lx = lm => (1 - lm.x) * width;
  const ly = lm => lm.y * height;
  function center(h) {
    let sx=0, sy=0;
    for (const lm of h) { sx+=lx(lm); sy+=ly(lm); }
    return { x: sx/h.length, y: sy/h.length };
  }

  // ─── Background grid ────────────────────────────────────
  function drawGrid() {
    const step = 55;
    stroke(CN[0], CN[1], CN[2], 7); strokeWeight(0.4);
    for (let x=0; x<width;  x+=step) line(x,0,x,height);
    for (let y=0; y<height; y+=step) line(0,y,width,y);
  }

  // ─── Hand bones & dots ──────────────────────────────────
  function drawBones(h) {
    glow(CN, P.glow * 0.3); stroke(CN[0], CN[1], CN[2], 30); strokeWeight(0.7); noFill();
    for (const [a,b] of BONES) line(lx(h[a]),ly(h[a]),lx(h[b]),ly(h[b]));
    noGlow();
  }

  function drawDots(h) {
    noStroke();
    const pulse = 1 + 0.2 * Math.sin(T * 5.5);
    for (let i=0; i<h.length; i++) {
      const x=lx(h[i]), y=ly(h[i]);
      const tip = TIPS.includes(i);
      const r   = tip ? P.dot * pulse : P.dot * 0.42;
      const col = tip ? CW : CN;
      glow(col, P.glow * (tip ? 1.4 : 0.55));
      fill(col[0], col[1], col[2], tip ? 215 : 140);
      circle(x, y, r * 2);
      if (tip) {
        glow(CW, P.glow * 0.45); fill(255,255,255,220);
        circle(x, y, r * 0.55);
      }
      noGlow();
    }
  }

  // ─── Glow helpers ───────────────────────────────────────
  function glow(col, blur) {
    drawingContext.shadowBlur  = blur;
    drawingContext.shadowColor = `rgb(${col[0]},${col[1]},${col[2]})`;
  }
  function noGlow() { drawingContext.shadowBlur = 0; }

  // ─── Bezier stroke helper ────────────────────────────────
  function bezier2(ax,ay,cpx,cpy,bx,by) {
    beginShape(); vertex(ax,ay); quadraticVertex(cpx,cpy,bx,by); endShape();
  }

  // ═══════════════════════════════════════════════════════
  //  MODE 0 — NEURAL WEB
  // ═══════════════════════════════════════════════════════
  function modeNeuralWeb(h0, h1) {
    // Build pairs: two-hand = all 5×5 combos; one-hand = all C(5,2) pairs
    const pairs = [];
    if (h1) {
      for (let ai=0; ai<TIPS.length; ai++)
        for (let bi=0; bi<TIPS.length; bi++)
          pairs.push([h0[TIPS[ai]], h1[TIPS[bi]], ai, bi]);
    } else {
      for (let ai=0; ai<TIPS.length; ai++)
        for (let bi=ai+1; bi<TIPS.length; bi++)
          pairs.push([h0[TIPS[ai]], h0[TIPS[bi]], ai, bi]);
    }

    for (const [A, B, ai, bi] of pairs) {
      const ax=lx(A), ay=ly(A), bx=lx(B), by=ly(B);
      const d = Math.hypot(bx-ax, by-ay);
      const diag = Math.hypot(width, height);
      const ten = Math.min(d / (diag * 0.52), 1);

      const mx=(ax+bx)*0.5, my=(ay+by)*0.5;
      const len=d||1;
      const nx=-(by-ay)/len, ny=(bx-ax)/len;
      const sag = d * P.sag * Math.sin(T*3 + ai*1.37 + bi*0.91);
      const cpx=mx+nx*sag, cpy=my+ny*sag;

      const sw = map(ten, 0, 1, P.lw, P.lw * 0.18);
      const al = map(ten, 0, 1, 195, 55);

      glow(CN, P.glow * 0.9);
      stroke(CN[0], CN[1], CN[2], al * 0.28); strokeWeight(sw + 5); noFill();
      bezier2(ax,ay,cpx,cpy,bx,by);
      glow(CW, P.glow * 0.35);
      stroke(CW[0], CW[1], CW[2], al); strokeWeight(sw);
      bezier2(ax,ay,cpx,cpy,bx,by);
      noGlow();
    }
  }

  // ═══════════════════════════════════════════════════════
  //  MODE 1 — DOUBLE HELIX
  // ═══════════════════════════════════════════════════════
  function modeHelix(h0, h1) {
    // One hand: axis runs wrist → middle fingertip; two hands: hand-center to hand-center
    const c0 = h1 ? center(h0) : { x:lx(h0[0]),  y:ly(h0[0])  };
    const c1 = h1 ? center(h1) : { x:lx(h0[12]), y:ly(h0[12]) };

    const dx=c1.x-c0.x, dy=c1.y-c0.y;
    const axLen = Math.hypot(dx,dy)||1;
    const px=-dy/axLen, py=dx/axLen;   // perp unit

    const STEPS=120, TWISTS=6;
    const amp = axLen * 0.09;

    const s0=[], s1=[];
    for (let i=0; i<=STEPS; i++) {
      const tt = i/STEPS;
      const bx = c0.x + dx*tt, by = c0.y + dy*tt;
      const ang = TWISTS * TWO_PI * tt + T * 2.2;
      const off = Math.cos(ang) * amp;
      s0.push({ x: bx + px*off, y: by + py*off });
      s1.push({ x: bx - px*off, y: by - py*off });
    }

    const drawStrand = (pts, col, al) => {
      glow(col, P.glow);
      stroke(col[0],col[1],col[2],al); strokeWeight(P.lw); noFill();
      beginShape();
      for (const p of pts) vertex(p.x,p.y);
      endShape();
      noGlow();
    };
    drawStrand(s0, CN, 200);
    drawStrand(s1, CW, 160);

    const interval = Math.max(2, Math.floor(STEPS / (TWISTS * 2)));
    for (let i=interval; i<STEPS; i+=interval) {
      const p0=s0[i], p1=s1[i];
      glow(CN, P.glow * 0.55);
      stroke(CN[0],CN[1],CN[2],110); strokeWeight(P.lw * 0.55);
      line(p0.x,p0.y,p1.x,p1.y);
      noStroke(); fill(CN[0],CN[1],CN[2],180);
      circle(p0.x,p0.y,4); circle(p1.x,p1.y,4);
      noGlow();
    }
  }

  // ═══════════════════════════════════════════════════════
  //  MODE 2 — SIGIL GATE
  // ═══════════════════════════════════════════════════════
  function modeSigilGate(h0, h1) {
    const c0=center(h0), c1=h1 ? center(h1) : { x:lx(h0[9]), y:ly(h0[9]) };
    const cx=(c0.x+c1.x)*0.5, cy=(c0.y+c1.y)*0.5;
    // Single hand: use palm span as radius; two hands: use hand distance
    const dist = h1 ? Math.hypot(c1.x-c0.x, c1.y-c0.y)
                    : Math.hypot(lx(h0[12])-lx(h0[0]), ly(h0[12])-ly(h0[0])) * 1.4;
    const R = dist * 0.38;
    const r0=T*0.45, r1=-T*0.65;

    const poly = (n, r, rot, col, al, sw_=P.lw*0.65) => {
      glow(col, P.glow * 0.85);
      stroke(col[0],col[1],col[2],al); strokeWeight(sw_); noFill();
      beginShape();
      for (let i=0; i<=n; i++) {
        const a = rot + TWO_PI*i/n - HALF_PI;
        vertex(cx+cos(a)*r, cy+sin(a)*r);
      }
      endShape();
      noGlow();
    };

    const star = (n, r1_, r2, rot, col, al) => {
      glow(col, P.glow);
      stroke(col[0],col[1],col[2],al); strokeWeight(P.lw*0.55); noFill();
      beginShape();
      for (let i=0; i<=n*2; i++) {
        const a = rot + TWO_PI*i/(n*2) - HALF_PI;
        const r = (i%2===0) ? r1_ : r2;
        vertex(cx+cos(a)*r, cy+sin(a)*r);
      }
      endShape();
      noGlow();
    };

    // Outer ring
    glow(CN, P.glow*0.5); stroke(CN[0],CN[1],CN[2],60); strokeWeight(P.lw*0.4); noFill();
    circle(cx,cy,R*2.15); noGlow();

    // Geometric layers
    star(5, R*0.95, R*0.4,  r0,     CN, 155);
    poly(6, R*0.68,          r1,     CW, 110);
    poly(3, R*0.55,          r0*1.6, CN,  95);
    star(4, R*0.32, R*0.15, r1*2.1,  CW, 175);

    // Radial spokes
    glow(CN, P.glow*0.3); stroke(CN[0],CN[1],CN[2],40); strokeWeight(P.lw*0.35);
    for (let i=0; i<10; i++) {
      const a = r0 + TWO_PI*i/10 - HALF_PI;
      line(cx,cy, cx+cos(a)*R*0.92, cy+sin(a)*R*0.92);
    }
    noGlow();

    // Center orb
    glow(CW, P.glow*1.8); noStroke(); fill(255,255,255,225); circle(cx,cy,7); noGlow();

    // Connecting lines to fingertips (filter null for single-hand case)
    glow(CN, P.glow*0.4); stroke(CN[0],CN[1],CN[2],35); strokeWeight(P.lw*0.3);
    for (const h of [h0, h1].filter(Boolean)) {
      for (const ti of TIPS) line(cx,cy, lx(h[ti]), ly(h[ti]));
    }
    noGlow();
  }

  // ═══════════════════════════════════════════════════════
  //  MODE 3 — CIRCUIT TRACE
  // ═══════════════════════════════════════════════════════
  function modeCircuit(h0, h1) {
    if (h1) {
      // Two hands: L-shaped traces fingertip-to-fingertip
      for (let i=0; i<TIPS.length; i++) {
        const A=h0[TIPS[i]], B=h1[TIPS[i]];
        const ax=lx(A), ay=ly(A), bx=lx(B), by=ly(B);
        const kx=(ax+bx)*0.5;

        glow(CN, P.glow*0.65);
        stroke(CN[0],CN[1],CN[2],120); strokeWeight(P.lw); noFill();
        line(ax,ay, kx,ay); line(kx,ay, kx,by); line(kx,by, bx,by);
        noGlow();

        const ps=P.dot*0.7;
        glow(CG, P.glow*0.9); fill(CG[0],CG[1],CG[2],170); noStroke();
        rect(ax-ps/2,ay-ps/2,ps,ps); rect(bx-ps/2,by-ps/2,ps,ps);
        fill(CN[0],CN[1],CN[2],150);
        circle(kx,ay,ps*0.65); circle(kx,by,ps*0.65);
        noGlow();

        const seg1=Math.abs(kx-ax), seg2=Math.abs(by-ay), seg3=Math.abs(bx-kx);
        const total=(seg1+seg2+seg3)||1;
        const pOff=((T*90+i*35)%total);
        let ppx=ax, ppy=ay;
        if (pOff<seg1)            { ppx=ax+(kx-ax)*(pOff/seg1); ppy=ay; }
        else if (pOff<seg1+seg2)  { ppx=kx; ppy=ay+(by-ay)*((pOff-seg1)/(seg2||1)); }
        else                      { ppx=kx+(bx-kx)*((pOff-seg1-seg2)/(seg3||1)); ppy=by; }
        glow(CW,P.glow*2); noStroke(); fill(255,255,255,240); circle(ppx,ppy,4); noGlow();
      }
      const w0=h0[0], w1=h1[0];
      glow(CN,P.glow*0.3); stroke(CN[0],CN[1],CN[2],25); strokeWeight(P.lw*0.3);
      line(lx(w0),ly(w0),lx(w1),ly(w1)); noGlow();
    } else {
      // One hand: wrist → each fingertip with L-trace
      const wx=lx(h0[0]), wy=ly(h0[0]);
      for (let i=0; i<TIPS.length; i++) {
        const ax=lx(h0[TIPS[i]]), ay=ly(h0[TIPS[i]]);
        const kx=wx, ky=ay;            // corner: same x as wrist, same y as tip

        glow(CN, P.glow*0.65);
        stroke(CN[0],CN[1],CN[2],120); strokeWeight(P.lw); noFill();
        line(wx,wy, kx,ky); line(kx,ky, ax,ay);
        noGlow();

        const ps=P.dot*0.7;
        glow(CG,P.glow*0.9); fill(CG[0],CG[1],CG[2],170); noStroke();
        rect(ax-ps/2,ay-ps/2,ps,ps);
        fill(CN[0],CN[1],CN[2],150); circle(kx,ky,ps*0.65); noGlow();

        const seg1=Math.abs(ky-wy), seg2=Math.abs(ax-kx);
        const total=(seg1+seg2)||1;
        const pOff=((T*90+i*35)%total);
        let ppx=wx, ppy=wy;
        if (pOff<seg1) { ppx=wx; ppy=wy+(ky-wy)*(pOff/seg1); }
        else           { ppx=kx+(ax-kx)*((pOff-seg1)/(seg2||1)); ppy=ky; }
        glow(CW,P.glow*2); noStroke(); fill(255,255,255,240); circle(ppx,ppy,4); noGlow();
      }
      // Wrist pad
      const ps=P.dot*0.9;
      glow(CG,P.glow); fill(CG[0],CG[1],CG[2],180); noStroke();
      rect(wx-ps/2,wy-ps/2,ps,ps); noGlow();
    }
  }

  // ═══════════════════════════════════════════════════════
  //  MODE 4 — VORTEX PORTAL
  // ═══════════════════════════════════════════════════════
  function modeVortex(h0, h1) {
    const c0 = center(h0);
    // One hand: vortex centered on palm, radius from wrist to middle tip
    const c1 = h1 ? center(h1) : { x:lx(h0[12]), y:ly(h0[12]) };
    const cx=(c0.x+c1.x)*0.5, cy=(c0.y+c1.y)*0.5;
    const dist = Math.hypot(c1.x-c0.x, c1.y-c0.y);
    const axAngle = Math.atan2(c1.y-c0.y, c1.x-c0.x) + HALF_PI;
    const maxR = dist * 0.58;
    const RINGS = 16;

    push(); translate(cx,cy); rotate(axAngle);
    for (let i=RINGS; i>=1; i--) {
      const tr    = i/RINGS;
      const ringR = maxR * tr;
      const squish = 0.28 + tr*0.14;
      const rotOff = T * 0.9 * (i%2===0 ? 1 : -1);
      const al    = map(i,1,RINGS, 230, 35);
      const sw    = map(i,1,RINGS, P.lw*1.3, P.lw*0.25);

      glow(CN, P.glow * 0.65 * tr);
      stroke(CN[0],CN[1],CN[2],al); strokeWeight(sw); noFill();
      push(); rotate(rotOff);
      ellipse(0, 0, ringR*2, ringR*2*squish);
      pop();
      noGlow();
    }
    glow(CW, P.glow*2.2); noStroke(); fill(255,255,255,230); circle(0,0,P.dot*1.8); noGlow();
    pop();

    const arms = h1 ? [c0, c1] : [c0];
    for (const c of arms) {
      glow(CN, P.glow*0.4); stroke(CN[0],CN[1],CN[2],50); strokeWeight(P.lw*0.4);
      line(c.x,c.y, cx,cy); noGlow();
    }
  }

  // ═══════════════════════════════════════════════════════
  //  MODE 5 — CONSTELLATION
  // ═══════════════════════════════════════════════════════
  function modeConstellation(h0, h1) {
    const nodes = h1
      ? [ ...TIPS.map(i => ({ x:lx(h0[i]), y:ly(h0[i]) })),
          ...TIPS.map(i => ({ x:lx(h1[i]), y:ly(h1[i]) })) ]
      : TIPS.map(i => ({ x:lx(h0[i]), y:ly(h0[i]) }));

    // Use a fixed reference distance so alpha never collapses as hands separate.
    // Lines fade only by distance relative to a short "close" threshold,
    // then hold a comfortable minimum so all edges stay visible.
    const closeD = Math.hypot(width, height) * 0.12;  // below this = brightest
    const diag   = Math.hypot(width, height);

    for (let a=0; a<nodes.length; a++) {
      for (let b=a+1; b<nodes.length; b++) {
        const d = Math.hypot(nodes[b].x-nodes[a].x, nodes[b].y-nodes[a].y);
        // Alpha: 175 when close, floors at 65 no matter how far apart
        const al   = max(65, map(d, 0, closeD, 175, 65));
        const sw   = max(P.lw*0.22, map(d, 0, closeD, P.lw*0.9, P.lw*0.3));
        const pulse = (sin(T*2.2 + a*0.6 + b*0.4) + 1) * 0.5;

        glow(CN, P.glow * 0.45 * pulse);
        stroke(CN[0],CN[1],CN[2], al * (0.55 + 0.45*pulse));
        strokeWeight(sw);
        line(nodes[a].x,nodes[a].y, nodes[b].x,nodes[b].y);
        noGlow();
      }
    }

    // Node markers: crosshair + diamond
    for (const n of nodes) {
      const s = P.dot * 0.9;
      glow(CW, P.glow*0.9);
      stroke(CW[0],CW[1],CW[2],190); strokeWeight(0.8); noFill();
      line(n.x-s,n.y,   n.x+s,n.y);
      line(n.x,  n.y-s, n.x,  n.y+s);
      line(n.x-s*.55,n.y,   n.x,n.y-s*.55);
      line(n.x,n.y-s*.55,   n.x+s*.55,n.y);
      line(n.x+s*.55,n.y,   n.x,n.y+s*.55);
      line(n.x,n.y+s*.55,   n.x-s*.55,n.y);
      noGlow();
      glow(CW, P.glow*0.5); noStroke(); fill(255,255,255,200); circle(n.x,n.y,2.5); noGlow();
    }

    // Ghostly wrist anchors
    const wrists = h1 ? [h0[0], h1[0]] : [h0[0]];
    glow(CN, P.glow*0.25); stroke(CN[0],CN[1],CN[2],18); strokeWeight(P.lw*0.25);
    for (const n of nodes)
      for (const w of wrists) line(n.x,n.y, lx(w),ly(w));
    noGlow();
  }

  // ═══════════════════════════════════════════════════════
  //  MEDIAPIPE
  // ═══════════════════════════════════════════════════════
  function initMP() {
    const tracker = new Hands({
      locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`,
    });
    tracker.setOptions({ maxNumHands:2, modelComplexity:1,
      minDetectionConfidence:0.65, minTrackingConfidence:0.55 });
    tracker.onResults(r => { handResults = r; });

    new Camera(vid, {
      onFrame: async () => { await tracker.send({ image: vid }); },
      width:1280, height:720,
    }).start()
      .then(()  => setCamOK(true))
      .catch(e  => { setCamOK(false); console.error(e); });
  }

  // ═══════════════════════════════════════════════════════
  //  UI HELPERS
  // ═══════════════════════════════════════════════════════
  function setCamOK(ok) {
    const cls = ok ? 'ok' : 'err';
    const txt = ok ? 'CAMERA ACTIVE' : 'CAMERA ERROR';
    document.getElementById('h-cam').className   = 'hdot ' + cls;
    document.getElementById('p-sdot').className  = 'sdot ' + cls;
    document.getElementById('h-cam-txt').textContent = txt;
    document.getElementById('p-stxt').textContent    = txt;
  }

  function syncHandUI(n) {
    document.getElementById('h-h1').className = 'hdot' + (n>=1?' on':'');
    document.getElementById('h-h2').className = 'hdot' + (n>=2?' on':'');
    document.getElementById('p-p1').className = 'p-pip' + (n>=1?' on':'');
    document.getElementById('p-p2').className = 'p-pip' + (n>=2?' on':'');
    const t = n + ' HAND' + (n!==1?'S':'') + (n>=1?' DETECTED':'');
    document.getElementById('h-hands').textContent = t;
    document.getElementById('p-htxt').textContent  = t + ' DETECTED';
  }

  function toggleMenu() {
    menuOpen = !menuOpen;
    document.getElementById('panel').classList.toggle('open', menuOpen);
    document.getElementById('menu-btn').textContent = menuOpen ? '✕ SYS' : '≡ SYS';
  }

  function buildModeGrid() {
    const grid = document.getElementById('mode-grid');
    MODES.forEach((m,i) => {
      const b = document.createElement('button');
      b.className = 'mbtn' + (i===mode?' sel':'');
      b.innerHTML = m.label.replace('\n','<br>');
      b.onclick = () => selectMode(i);
      grid.appendChild(b);
    });
  }

  function selectMode(i) {
    mode = i;
    document.querySelectorAll('.mbtn').forEach((b,j) => b.classList.toggle('sel', j===i));
    document.getElementById('mode-label').textContent = MODES[i].label.replace('\n',' ');
  }

  function sp(key, val, dispId) {
    P[key] = val;
    document.getElementById(dispId).textContent = val;
  }

  function screenshot() {
    try {
      const c = document.querySelector('canvas');
      const a = document.createElement('a');
      a.download = 'catscradle-' + Date.now() + '.png';
      a.href = c.toDataURL('image/png');
      a.click();
    } catch(e) { console.warn('Screenshot blocked:', e); }
  }

  function resetP() {
    P = {...DEF};
    [['s-glow','v-glow','glow'],['s-trail','v-trail','trail'],
     ['s-vmix','v-vmix','vmix'],['s-lw','v-lw','lw'],
     ['s-sag','v-sag','sag'],['s-dot','v-dot','dot'],
     ['s-spd','v-spd','spd']].forEach(([sid,vid,key]) => {
       document.getElementById(sid).value = P[key];
       document.getElementById(vid).textContent = P[key];
    });
  }

  // ── Boot ────────────────────────────────────────────────
  window.addEventListener('load', initMP);
  </script>
</body>
